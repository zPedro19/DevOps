name: Discord Alert

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send alert to Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "GitHub Actions Alerta\nRepositório: ${{ github.repository }}\nEvento: ${{ github.event_name }}\nAutor: ${{ github.actor }}\nStatus: Workflow executado com sucesso"
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
